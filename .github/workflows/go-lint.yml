name: Go Lint
on:
  push:
    branches: [master]
  pull_request:
permissions:
  contents: read
concurrency:
  group: go-lint-${{ github.ref }}
  cancel-in-progress: true
jobs:
  go-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        dir:
          - containers/ffmpeg/adapter
          - containers/ndi/adapter
          - containers/omt/adapter
          - containers/srt/adapter
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 'stable'
          cache: false
      - working-directory: ${{ matrix.dir }}
        run: test -z "$(gofmt -l .)" || { echo 'gofmt needed:'; gofmt -l .; exit 1; }
      - working-directory: ${{ matrix.dir }}
        run: go vet ./...
