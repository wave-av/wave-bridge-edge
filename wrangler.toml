name = "wave-bridge-edge"
main = "src/worker.ts"
compatibility_date = "2026-04-15"
compatibility_flags = ["nodejs_compat"]

# wave-foundation pin — keep in sync with .foundation-version.
[[unsafe.bindings]]
type = "plain_text"
name = "FOUNDATION_VERSION"
text = "v1.5.0"

# Shared activation flag — DEFAULT OFF. ALL protocol routes (src/srt.ts, src/ndi.ts, …) return an
# honest typed 501 (`not_activated`) until BOTH of these are true for the matching protocol:
#   1. the [[containers]] binding below is provisioned (binding name MUST match what src/<proto>.ts reads), AND
#   2. BRIDGE_FORWARD_ENABLED = "true".
# Even with the flag flipped, each handler FAIL-CLOSES to its typed 501 unless its specific binding
# exists — so this flag is inert (never fabricates transport) until the operator completes activation
# for that specific protocol.
[vars]
BRIDGE_FORWARD_ENABLED = "false"

# MoQ container binding — LIVE (WB-6 / E4). The one strand that genuinely runs hosted: CF Containers
# have no public UDP ingress, but the MoQ strand reaches the relay over an OUTBOUND WebSocket, which
# works from inside a container. The image (containers/moq) runs the PROVEN strand verbatim and
# round-trips real objects through moq.wave.online. Current-schema container block (mux-engine pattern):
# built at deploy from the Dockerfile, bound as a Durable Object the Worker reaches via getContainer().
# Requires CF Containers on the deploying account (Jake@gmail acct — wave.online acct is free-tier, no
# Containers). If the binding is absent, src/moq.ts fail-closes to a typed 501 (no fabricated round-trip).
[[containers]]
class_name = "MoqContainer"
image = "./containers/moq/Dockerfile"
max_instances = 3

[[durable_objects.bindings]]
name = "MOQ_BRIDGE"
class_name = "MoqContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MoqContainer"]

# SRT container binding — populated when Wave-1 SRT spike provisions. OPERATOR-GATED: requires the
# containers/srt image to be built+pushed (currently 0.0.0-scaffold, UNPUBLISHED) AND CF Containers
# enabled on the account. The binding name MUST be SRT_BRIDGE (src/srt.ts reads env.SRT_BRIDGE).
# [[containers]]
# name = "srt-bridge"
# binding = "SRT_BRIDGE"
# image = "docker.io/wave-av/wave-srt-bridge:0.0.0-scaffold"
# instance_type = "standard"  # or "lite" / "max" per active-CPU economics

# NDI container binding — Wave-2 NDI bridge (NDI 6 Discovery Server + Go adapter that bridges to MoQ).
# OPERATOR-GATED ON THREE FRONTS (one more than SRT): the containers/ndi image is unpushed AND CF
# Containers is off AND Vizrt NDI Advanced SDK redistribution clause is unresolved (#169 NDI Developer
# Program). `libndi_advanced` is NEVER bundled into the image — the adapter fetches it at runtime from
# a Vizrt-authorized URL once licensing clears. The binding name MUST be NDI_BRIDGE (src/ndi.ts reads
# env.NDI_BRIDGE).
# [[containers]]
# name = "ndi-bridge"
# binding = "NDI_BRIDGE"
# image = "docker.io/wave-av/wave-ndi-bridge:0.0.0-scaffold"
# instance_type = "standard"  # NDI 6 HDR + WAN discovery ≈ standard tier

# OMT (Open Media Transport) container binding — egress matrix (#73). OPERATOR-GATED on TWO fronts (one
# FEWER than NDI: OMT is open-spec, NO Vizrt-style redistribution license): the containers/omt image is
# unpushed (scaffold) AND CF Containers is off. The binding name MUST be OMT_BRIDGE (src/omt.ts reads
# env.OMT_BRIDGE). .NET 8 + libomtnet + libvmx + a Go control plane (gateway scope/meter/settle).
# [[containers]]
# name = "omt-bridge"
# binding = "OMT_BRIDGE"
# image = "docker.io/wave-av/wave-omt-bridge:0.0.0-scaffold"
# instance_type = "standard"  # .NET 8 + libomtnet ≈ standard tier

# FFmpeg file-playout container binding — the RECORDED-first egress ENGINE (#73, contract ADR). PULLs a
# finalized R2 recording (outbound signed GET on objectUrl) → ffmpeg 8.1.1 demux/transcode → feeds the
# SRT/NDI/OMT sender. OPERATOR-GATED: the containers/ffmpeg image is unpushed (scaffold) AND CF Containers
# is off. The binding name MUST be FFMPEG_BRIDGE (src/ffmpeg.ts reads env.FFMPEG_BRIDGE). No R2 creds live
# in this container (single-writer A-DO invariant: the DO/driver owns R2; this stage is pure transcode).
# [[containers]]
# name = "ffmpeg-playout"
# binding = "FFMPEG_BRIDGE"
# image = "docker.io/wave-av/wave-ffmpeg-bridge:0.0.0-scaffold"
# instance_type = "standard"  # ffmpeg AV2/AV1/H.264 transcode ≈ standard tier (max for AV2 heavy paths)
