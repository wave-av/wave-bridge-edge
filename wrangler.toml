name = "wave-bridge-edge"
main = "src/worker.ts"
compatibility_date = "2026-04-15"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# ROUTES — the bridge.wave.online APEX is served by the Core-Origin Next.js app (a separate worker).
# This worker owns ONLY the protocol paths. Without these routes the worker is invoked solely via the
# gateway service-binding, so a direct `curl https://bridge.wave.online/srt` falls through to the
# Core-Origin app and returns its Next.js 404 — NOT this worker's honest typed 501. That makes the
# egress honest-501 independently unreachable for a receipt. These PATH-SCOPED routes attach the worker
# to exactly the protocol paths (and /health for liveness) while leaving the apex `/` to Core-Origin,
# so a receipt becomes obtainable WITHOUT changing the Core-Origin app's routing.
#
# ROUTES PLACEMENT LAW (config-no-silent-noop, mirrors wave-realtime-edge/wave-media-edge): `routes`
# MUST be a top-level key BEFORE any [table] header (e.g. before [vars]). A `routes` key placed after a
# [table] is parsed as that table's field and SILENTLY ignored ("Unexpected fields…routes") — the
# routes never attach. zone_name="wave.online" + path patterns = Worker Routes (not custom_domain;
# custom_domain would claim the whole hostname and collide with Core-Origin's apex).
#
# DORMANCY NOTE: attaching these routes makes the worker independently reachable, but every protocol
# path still returns its honest typed 501 (SRT_BRIDGE_NOT_ACTIVATED, …) until its [[containers]] binding
# is provisioned AND BRIDGE_FORWARD_ENABLED="true". /bridge (MoQ) is the one LIVE path. No transport is
# fabricated by adding a route — the route only makes the EXISTING honest-501 receivable for a receipt.
#
# ⚠️ FIRST-DEPLOY AUDIT: before merge takes effect, audit for a stale Worker Route on these patterns
# that could shadow this worker, and confirm Core-Origin does not also claim `bridge.wave.online/srt*`.
routes = [
  { pattern = "bridge.wave.online/health", zone_name = "wave.online" },
  { pattern = "bridge.wave.online/bridge*", zone_name = "wave.online" },
  { pattern = "bridge.wave.online/srt*", zone_name = "wave.online" },
  { pattern = "bridge.wave.online/ndi*", zone_name = "wave.online" },
  { pattern = "bridge.wave.online/omt*", zone_name = "wave.online" },
  { pattern = "bridge.wave.online/playout*", zone_name = "wave.online" },
  { pattern = "bridge.wave.online/egress*", zone_name = "wave.online" },
]

# wave-foundation pin — keep in sync with .foundation-version.
[[unsafe.bindings]]
type = "plain_text"
name = "FOUNDATION_VERSION"
text = "v1.5.0"

# Shared activation flag — DEFAULT OFF. ALL protocol routes (src/srt.ts, src/ndi.ts, …) return an
# honest typed 501 (`not_activated`) until BOTH of these are true for the matching protocol:
#   1. the [[containers]] binding below is provisioned (binding name MUST match what src/<proto>.ts reads), AND
#   2. BRIDGE_FORWARD_ENABLED = "true".
# Even with the flag flipped, each handler FAIL-CLOSES to its typed 501 unless its specific binding
# exists — so this flag is inert (never fabricates transport) until the operator completes activation
# for that specific protocol.
[vars]
BRIDGE_FORWARD_ENABLED = "false"
# #27: the relay (moq.wave.online) flipped to auth default-ON, so the /bridge MoQ strand must exchange a
# durable org bearer at the gateway for a short-lived relay join-token. MoqContainer forwards these into
# the container process env; the strand mints per-connect. WAVE_MOQ_TOKEN is a Worker SECRET (set via
# `wrangler secret put WAVE_MOQ_TOKEN`), NOT a var — never commit the token value.
WAVE_MOQ_JOIN = "1"
WAVE_MOQ_GATEWAY = "https://api.wave.online"

# MoQ container binding — LIVE (WB-6 / E4). The one strand that genuinely runs hosted: CF Containers
# have no public UDP ingress, but the MoQ strand reaches the relay over an OUTBOUND WebSocket, which
# works from inside a container. The image (containers/moq) runs the PROVEN strand verbatim and
# round-trips real objects through moq.wave.online. Current-schema container block (mux-engine pattern):
# built at deploy from the Dockerfile, bound as a Durable Object the Worker reaches via getContainer().
# Requires CF Containers on the deploying account (Jake@gmail acct — wave.online acct is free-tier, no
# Containers). If the binding is absent, src/moq.ts fail-closes to a typed 501 (no fabricated round-trip).
# max_instances is the HARD ceiling on live MoqContainer instances. src/moq.ts hashes requests across a
# warm pool of MOQ_POOL_SIZE stable shards (default 8, env-tunable without a code deploy); max_instances
# = pool size + RECYCLE HEADROOM so the platform can start a replacement instance while an old one drains.
# Grow BOTH together to serve more concurrent client round-trips; at saturation the handler returns honest
# 503 backpressure, never a raw 500. (The original max_instances=3 + random-per-request ids is what wedged
# the pool with un-draining instances — see src/moq.ts warm-pool notes.)
[[containers]]
class_name = "MoqContainer"
image = "./containers/moq/Dockerfile"
max_instances = 10

[[durable_objects.bindings]]
name = "MOQ_BRIDGE"
class_name = "MoqContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MoqContainer"]

# Egress-strand DO classes (#134) — register SrtContainer/FfmpegContainer/NdiContainer/OmtContainer so the
# worker parses + dry-run-deploys with all four exported classes. REGISTERING THE CLASS IS INERT: it only
# declares the SQLite-backed DO class exists; it binds NO container and opens NO UDP/transport. The actual
# [[containers]] + [[durable_objects.bindings]] blocks below stay COMMENTED, and BRIDGE_FORWARD_ENABLED stays
# "false" — so no egress strand can run. This migration lets the live MoQ container deploy alone today while
# the egress classes wait, dormant, for an operator to uncomment their binding + build their image.
[[migrations]]
tag = "v2"
new_sqlite_classes = ["SrtContainer", "FfmpegContainer", "NdiContainer", "OmtContainer"]

# SRT container binding — egress matrix (#73 / #134). OPERATOR-GATED on TWO fronts: the containers/srt image
# is unpushed (egress adapter is a scaffold) AND CF Containers is off. The binding name MUST be SRT_BRIDGE
# (src/srt.ts reads env.SRT_BRIDGE). Mirrors the live MoQ block's current schema (class_name + durable_objects
# binding); the Worker reaches it via getContainer(). The egress adapter (containers/srt/egress) does MoQ/file
# → SRT CALLER push-out; libsrt is BSD (no license gate, unlike NDI). UNCOMMENT only after the image is
# built+pushed AND Containers on. (Class is already registered in [[migrations]] v2 above — inert until bound.)
#
# ACTIVATED (#53): the egress image now carries a REAL ffmpeg --enable-libsrt sender (containers/srt/egress),
# so the binding is uncommented. SAFETY: this binding ALONE does NOT arm SRT — src/srt.ts srtActivated()
# requires the binding present AND BRIDGE_FORWARD_ENABLED="true". The flag stays "false" (see [vars] above),
# so /srt still returns the honest 501 until an operator flips the flag (the ◆ live crossing; runbook Step 5).
# Even when armed, /srt forwards to this REAL sender — no fabricated transport at any point.
[[containers]]
class_name = "SrtContainer"
image = "./containers/srt/egress/Dockerfile"
max_instances = 3

[[durable_objects.bindings]]
name = "SRT_BRIDGE"
class_name = "SrtContainer"

# NDI container binding — Wave-2 NDI bridge (#134; NDI 6 Discovery Server + Go adapter that bridges to MoQ).
# OPERATOR-GATED ON THREE FRONTS (one more than SRT): the containers/ndi image is unpushed AND CF Containers
# is off AND the Vizrt NDI Advanced SDK redistribution clause is unresolved (#169 NDI Developer Program).
# `libndi_advanced` is NEVER bundled into the image — the adapter fetches it at runtime from a Vizrt-authorized
# URL once licensing clears. The binding name MUST be NDI_BRIDGE (src/ndi.ts reads env.NDI_BRIDGE). Same
# class_name + durable_objects schema as the live MoQ block. (Class registered in [[migrations]] v2 above.)
# [[containers]]
# class_name = "NdiContainer"
# image = "./containers/ndi/Dockerfile"
# max_instances = 3
#
# [[durable_objects.bindings]]
# name = "NDI_BRIDGE"
# class_name = "NdiContainer"

# OMT (Open Media Transport) container binding — egress matrix (#73 / #134). OPERATOR-GATED on TWO fronts (one
# FEWER than NDI: OMT is open-spec, NO Vizrt-style redistribution license): the containers/omt image is unpushed
# (scaffold) AND CF Containers is off. The binding name MUST be OMT_BRIDGE (src/omt.ts reads env.OMT_BRIDGE).
# .NET 8 + libomtnet + libvmx + a Go control plane. Same class_name + durable_objects schema as the MoQ block.
# (Class registered in [[migrations]] v2 above — inert until bound.)
# [[containers]]
# class_name = "OmtContainer"
# image = "./containers/omt/Dockerfile"
# max_instances = 3
#
# [[durable_objects.bindings]]
# name = "OMT_BRIDGE"
# class_name = "OmtContainer"

# FFmpeg file-playout container binding — the RECORDED-first egress ENGINE (#73 / #134, contract ADR). PULLs a
# finalized R2 recording (outbound signed GET on objectUrl) → ffmpeg 8.1.1 demux/transcode → feeds the
# SRT/NDI/OMT sender. OPERATOR-GATED: the containers/ffmpeg image is unpushed (scaffold) AND CF Containers is
# off. The binding name MUST be FFMPEG_BRIDGE (src/ffmpeg.ts reads env.FFMPEG_BRIDGE). No R2 creds live in this
# container (single-writer A-DO invariant: the DO/driver owns R2; this stage is pure transcode). Same class_name
# + durable_objects schema as the MoQ block. (Class registered in [[migrations]] v2 above — inert until bound.)
# [[containers]]
# class_name = "FfmpegContainer"
# image = "./containers/ffmpeg/Dockerfile"
# max_instances = 3
#
# [[durable_objects.bindings]]
# name = "FFMPEG_BRIDGE"
# class_name = "FfmpegContainer"
